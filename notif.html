<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: transparent; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; }

  .popup {
    margin: 10px;
    background: #131316;
    border: 1px solid #3f3f46;
    border-radius: 16px;
    box-shadow: 0 16px 56px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.05);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    animation: slide-in 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(70px) scale(0.95); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }

  .accent-bar {
    height: 3px;
    background: linear-gradient(90deg, #ff6b00, #fbbf24, #ff6b00);
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% 0; } }

  .content { padding: 14px 16px 12px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .brand { display: flex; align-items: center; gap: 6px; font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #ff6b00; }
  .brand-dot { width: 6px; height: 6px; background: #ff6b00; border-radius: 1px; animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  .close-btn { width: 20px; height: 20px; background: #27272a; border: none; border-radius: 50%; color: #71717a; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .close-btn:hover { background: #3f3f46; color: #fafafa; }

  .notif-title { font-size: 15px; font-weight: 700; color: #fafafa; margin-bottom: 10px; line-height: 1.3; }

  .task-list { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }

  .task-row { border-radius: 8px; border-left: 2px solid #27272a; background: #1c1c20; overflow: hidden; }
  .task-row.haute   { border-left-color: #ef4444; }
  .task-row.moyenne { border-left-color: #ff6b00; }
  .task-row.basse   { border-left-color: #52525b; }
  .task-row.task-completed { opacity: 0.4; }
  .task-row.task-completed .task-actions { display: none; }
  .task-row.task-completed .task-reschedule { display: none; }

  .task-main { display: flex; align-items: center; gap: 8px; padding: 7px 10px 5px; }
  .task-icon { font-size: 13px; flex-shrink: 0; }
  .task-name { font-size: 12px; color: #e4e4e7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }

  /* Ligne 1 : Fait + Demain */
  .task-actions { display: flex; gap: 4px; padding: 0 10px 5px; }
  .task-btn { flex: 1; padding: 5px 6px; border: none; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; }
  .done-btn     { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
  .done-btn:hover { background: rgba(34,197,94,0.22); }
  .tomorrow-btn { background: rgba(59,130,246,0.1);  color: #3b82f6; border: 1px solid rgba(59,130,246,0.22); }
  .tomorrow-btn:hover { background: rgba(59,130,246,0.2); }

  /* Ligne 2 : champ heure + replanifier */
  .task-reschedule { display: flex; align-items: center; gap: 5px; padding: 0 10px 8px; }
  .resched-input { background: #09090b; border: 1px solid #3f3f46; color: #ff6b00; padding: 4px 7px; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; width: 96px; outline: none; cursor: pointer; }
  .resched-input:focus { border-color: #ff6b00; }
  .resched-btn { flex: 1; padding: 4px 8px; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.25); color: #ff6b00; border-radius: 5px; font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .resched-btn:hover { background: rgba(255,107,0,0.2); }

  .more-label { font-size: 11px; color: #52525b; text-align: center; margin-bottom: 10px; font-family: ui-monospace, monospace; }
  .simple-body { font-size: 13px; color: #a1a1aa; margin-bottom: 10px; line-height: 1.5; }

  .progress-row { background: #09090b; border-radius: 7px; padding: 9px 11px; margin-bottom: 8px; }
  .prog-bar { height: 4px; background: #27272a; border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .prog-fill { height: 100%; background: linear-gradient(90deg, #ff6b00, #fbbf24); border-radius: 2px; transition: width 0.5s; }
  .prog-meta { display: flex; justify-content: space-between; font-family: ui-monospace, monospace; font-size: 10px; color: #52525b; }
  .prog-meta .done { color: #22c55e; }

  .footer { display: flex; align-items: center; justify-content: space-between; padding: 0 2px; }
  .open-hint { font-family: ui-monospace, monospace; font-size: 9px; color: #3f3f46; letter-spacing: 0.06em; }
  .timer-dots { display: flex; gap: 3px; }
  .timer-dot { width: 4px; height: 4px; background: #27272a; border-radius: 50%; }
  .timer-dot.active { background: #ff6b00; animation: dot-fade 10s linear forwards; }
  @keyframes dot-fade { to { opacity: 0; } }

  .dismiss-bar { height: 2px; background: #1c1c20; position: relative; overflow: hidden; }
  .dismiss-fill { position: absolute; top: 0; left: 0; bottom: 0; background: #ff6b00; opacity: 0.4; animation: dismiss 10s linear forwards; width: 100%; }
  @keyframes dismiss { to { width: 0%; } }
</style>
</head>
<body>

<div class="popup" id="popup" onclick="openApp()">
  <div class="accent-bar"></div>
  <div class="content">
    <div class="header">
      <div class="brand"><div class="brand-dot"></div><span>HUSTLE.OS</span></div>
      <button class="close-btn" onclick="event.stopPropagation(); closeMe()">×</button>
    </div>

    <div class="notif-title" id="notif-title">Check-in</div>
    <div class="task-list" id="task-list"></div>
    <div class="more-label" id="more-label"></div>
    <div class="simple-body" id="simple-body" style="display:none;"></div>

    <div class="progress-row" id="progress-row" style="display:none;">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <div class="prog-meta">
        <span id="prog-done" class="done">0/0 validées</span>
        <span id="prog-pct">0%</span>
      </div>
    </div>

    <div class="footer">
      <span class="open-hint">CLIQUER POUR OUVRIR</span>
      <div class="timer-dots">
        <div class="timer-dot active"></div>
        <div class="timer-dot"></div>
        <div class="timer-dot"></div>
      </div>
    </div>
  </div>
  <div class="dismiss-bar"><div class="dismiss-fill"></div></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  let data = {};
  try { data = JSON.parse(decodeURIComponent(params.get('d') || '{}')); } catch(e) {}

  let totalDone = data.done || 0;
  let totalTasks = data.total || 0;

  document.getElementById('notif-title').textContent = data.title || 'Check-in';

  // Heure courante arrondie à la demi-heure suivante comme valeur par défaut
  function defaultTime() {
    const now = new Date();
    let h = now.getHours(), m = now.getMinutes();
    if (m < 30) m = 30; else { m = 0; h = Math.min(h + 1, 23); }
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  }

  if (data.tasks && data.tasks.length > 0) {
    const list = document.getElementById('task-list');
    const max = 5;
    data.tasks.slice(0, max).forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-row ' + (t.priority || 'moyenne');
      div.id = 'task-row-' + t.id;
      div.innerHTML = `
        <div class="task-main">
          <span class="task-icon">${t.icon || '⚡'}</span>
          <span class="task-name">${escHtml(t.text)}</span>
        </div>
        <div class="task-actions" onclick="event.stopPropagation()">
          <button class="task-btn done-btn"     onclick="markDone(${t.id}, this)">✅ Fait</button>
          <button class="task-btn tomorrow-btn" onclick="sendTomorrow(${t.id}, this)">📅 Demain</button>
        </div>
        <div class="task-reschedule" onclick="event.stopPropagation()">
          <input type="time" class="resched-input" id="resched-${t.id}" value="${t.time || defaultTime()}">
          <button class="resched-btn" onclick="reschedule(${t.id}, this)">⏰ Replanifier</button>
        </div>`;
      list.appendChild(div);
    });
    if (data.tasks.length > max) {
      document.getElementById('more-label').textContent = `+ ${data.tasks.length - max} autre(s)…`;
    }
  } else if (data.body) {
    document.getElementById('task-list').style.display = 'none';
    const sb = document.getElementById('simple-body');
    sb.style.display = 'block'; sb.textContent = data.body;
  }

  if (data.total > 0) showProgress(totalDone, totalTasks);

  function showProgress(done, total) {
    const row = document.getElementById('progress-row');
    row.style.display = 'block';
    const pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-done').textContent = `${done}/${total} validées`;
    document.getElementById('prog-pct').textContent = pct + '%';
  }

  function markDone(taskId, btn) {
    const row = document.getElementById('task-row-' + taskId);
    if (!row || row.classList.contains('task-completed')) return;
    btn.textContent = '✓ Validé !'; btn.disabled = true;
    row.classList.add('task-completed');
    totalDone++;
    if (totalTasks > 0) showProgress(totalDone, totalTasks);
    if (window.notifAPI) window.notifAPI.doneTask(taskId);
  }

  function sendTomorrow(taskId, btn) {
    btn.textContent = '📅 Décalé…'; btn.disabled = true;
    if (window.notifAPI) window.notifAPI.postponeTask(taskId).then(res => {
      if (res && res.slot) btn.textContent = `✓ ${res.slot} demain`;
    });
  }

  function reschedule(taskId, btn) {
    const input = document.getElementById('resched-' + taskId);
    const newTime = input.value;
    if (!newTime) return;
    btn.textContent = '✓ Replanifié !'; btn.disabled = true;
    if (window.notifAPI) window.notifAPI.rescheduleTask(taskId, newTime);
  }

  function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  function openApp() { if (window.notifAPI) window.notifAPI.openApp(); }
  function closeMe() { if (window.notifAPI) window.notifAPI.close(); }

  setTimeout(() => closeMe(), 10000);
</script>
</body>
</html>
